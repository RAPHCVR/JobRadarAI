[business_france_vie]
endpoint = "https://civiweb-api-prd.azurewebsites.net/api/Offers/search"
scan_all = true
query_scan = false
page_size = 100
max_results = 1200
max_queries = 10
results_per_query = 40
queries = [
  "Data",
  "Data Engineer",
  "Data Analyst",
  "IA",
  "AI",
  "Machine Learning",
  "MLOps",
  "Python",
  "LLM",
  "Research"
]

