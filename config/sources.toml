[run]
max_results_per_source = 1200
min_score = 35
fresh_days = 21
output_dir = "runs/latest"

[public_sources]
business_france_vie = true
forem = true
actiris = true
remotive = true
arbeitnow = true
remoteok = true
jobicy = true
himalayas = true

[business_france_vie]
endpoint = "https://civiweb-api-prd.azurewebsites.net/api/Offers/search"
scan_all = true
query_scan = false
page_size = 100
max_results = 1200
max_queries = 10
results_per_query = 40
queries = [
  "Data",
  "Data Engineer",
  "Data Analyst",
  "IA",
  "AI",
  "Machine Learning",
  "MLOps",
  "Python",
  "LLM",
  "Research"
]

[forem]
endpoint = "https://www.odwb.be/api/explore/v2.1/catalog/datasets/offres-d-emploi-forem/records"
max_queries = 18
results_per_query = 60

[actiris]
endpoint = "https://www.actiris.brussels/Umbraco/api/OffersApi/GetAllOffers"
max_queries = 18
page_size = 20
max_pages = 2

[france_travail]
max_queries = 22

[jooble]
max_queries = 8
locations = ["Ireland", "Switzerland", "Belgium", "Singapore", "France", "Netherlands", "Luxembourg", "United Kingdom", "Germany"]

[optional_sources]
adzuna = true
france_travail = true
serpapi_google_jobs = false
jooble = true
jobspy_api = true
jobspy_direct = true
vdab_generic = false

[jobspy_direct]
max_queries = 18
results_wanted = 12
hours_old = 336
sites = ["indeed"]
include_linkedin = false
locations = [
  { label = "Dublin, Ireland", country_indeed = "Ireland" },
  { label = "Zurich, Switzerland", country_indeed = "Switzerland" },
  { label = "Geneva, Switzerland", country_indeed = "Switzerland" },
  { label = "Brussels, Belgium", country_indeed = "Belgium" },
  { label = "Singapore", country_indeed = "Singapore" },
  { label = "Paris, France", country_indeed = "France" },
  { label = "Amsterdam, Netherlands", country_indeed = "Netherlands" },
  { label = "Luxembourg", country_indeed = "Luxembourg" },
  { label = "London, United Kingdom", country_indeed = "UK" },
  { label = "Berlin, Germany", country_indeed = "Germany" }
]

