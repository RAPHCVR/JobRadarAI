apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobradarai-web
  namespace: jobradarai
  labels:
    app.kubernetes.io/name: jobradarai-web
    app.kubernetes.io/part-of: jobradarai
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
    keel.sh/match-tag: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 5
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: jobradarai-web
      app.kubernetes.io/part-of: jobradarai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jobradarai-web
        app.kubernetes.io/part-of: jobradarai
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/raphcvr/jobradarai-web:latest
          imagePullPolicy: Always
          env:
            - name: JOBRADAR_WEB_COOKIE_SECURE
              value: "true"
            - name: JOBRADAR_WEB_SESSION_DAYS
              value: "14"
          envFrom:
            - secretRef:
                name: jobradarai-web-secret
          ports:
            - name: http
              containerPort: 8765
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
          volumeMounts:
            - name: data
              mountPath: /app/runs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jobradarai-data
        - name: tmp
          emptyDir: {}
